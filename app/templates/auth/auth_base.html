<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CryptoBase{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <script src="{{ url_for('static', filename='js/wallet.js') }}" defer></script>
  </head>
  <body>
    <div id="htmx-progress"></div>
    <div class="auth-page">
      <div class="auth-brand">
        <a href="{{ url_for('auth.connect') }}">CryptoBase</a>
        <p>Testnet DeFi portfolio manager</p>
      </div>

      <div id="alerts" class="alerts" style="width:100%;max-width:420px"></div>

      {% block content %}{% endblock %}
    </div>

    <script>
      function showAlert(message, type = "error") {
        const area = document.getElementById("alerts");
        const el = document.createElement("div");
        el.className = `alert alert-${type}`;
        el.textContent = message;
        area.appendChild(el);
        setTimeout(() => el.remove(), 6000);
      }
    </script>
  </body>
</html>
