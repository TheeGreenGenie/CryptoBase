<article class="metric">
  <span>Collateral</span>
  <strong class="muted" data-reveal="collateral_usd">Shielded</strong>
</article>
<article class="metric">
  <span>Debt</span>
  <strong class="muted" data-reveal="debt_usd">Shielded</strong>
</article>
<article class="metric">
  <span>Risk class</span>
  {% if risk_class == 'healthy' %}
    <strong style="color:hsl(120,78%,38%)">Healthy</strong>
  {% elif risk_class == 'watch' %}
    <strong style="color:hsl(45,78%,38%)">Watch</strong>
  {% elif risk_class == 'danger' %}
    <strong style="color:hsl(20,78%,38%)">Danger</strong>
  {% elif risk_class == 'liquidatable' %}
    <strong style="color:hsl(0,78%,38%)">Liquidatable</strong>
  {% else %}
    <strong class="muted">--</strong>
  {% endif %}
</article>
